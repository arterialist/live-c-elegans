<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>C. elegans Live Simulation</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1d24;
        color: #e8eaef;
        font-family: system-ui, sans-serif;
      }
      #bar {
        padding: 8px 12px;
        font-size: 13px;
        border-bottom: 1px solid #333;
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
      }
      #bar span.ok {
        color: #6c9;
      }
      #bar span.err {
        color: #e88;
      }
      #main-split {
        height: calc(100% - 42px);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #worm-panel {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      #canvas-wrap {
        flex: 1;
        min-height: 0;
        position: relative;
      }
      #worm-panel canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }
      #neural-panel {
        flex-shrink: 0;
        height: 200px;
        min-height: 120px;
        border-top: 1px solid #333;
        background: #151820;
      }
      #neural-panel canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #toast-stack {
        position: fixed;
        top: 48px;
        right: 12px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-end;
        pointer-events: none;
        max-width: min(320px, 92vw);
      }
      .toast {
        pointer-events: none;
        background: rgba(38, 42, 54, 0.96);
        border: 1px solid #4a5568;
        color: #e8eaef;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.35;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        animation: toast-in 0.22s ease-out;
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      #neural-tooltip {
        display: none;
        position: fixed;
        z-index: 1002;
        pointer-events: none;
        background: rgba(28, 31, 40, 0.96);
        border: 1px solid #555b6a;
        color: #e8eaef;
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 6px;
        max-width: 280px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      }
      kbd {
        background: #333;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <span id="status">Disconnected</span>
      <span id="online"></span>
      <span id="tick"></span>
      <span id="fps" title="Display frames per second">— fps</span>
      <span
        >Left: add food · Right: remove · <kbd>Shift</kbd>+drag: pan · Wheel:
        zoom · bottom: 302 PAULA cells (Cook A→P × D/V heuristic)</span
      >
    </div>
    <div id="main-split">
      <div id="worm-panel">
        <div id="canvas-wrap">
          <canvas id="c"></canvas>
        </div>
      </div>
      <div id="neural-panel">
        <canvas id="cn"></canvas>
      </div>
    </div>
    <div id="toast-stack" aria-live="polite" aria-relevant="additions"></div>
    <div id="neural-tooltip" role="tooltip"></div>
    <script src="app.js"></script>
  </body>
</html>
